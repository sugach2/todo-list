  <h1>プライバシーポリシー</h1>

  <p>本アプリ（ToDo List）は、ユーザー識別と表示のために LINE ログイン情報（ユーザーID・表示名）を利用します。</p>

  <p>ToDo データはアプリの機能提供のためにサーバー経由で Supabase に保存されます。</p>

  <p>取得した情報は ToDo 管理機能の提供目的でのみ利用し、法令に基づく場合を除き第三者へ提供しません。</p>

  <p>本ポリシーは必要に応じて改定されることがあります。</p>

</body>
